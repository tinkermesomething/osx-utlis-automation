name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Build packages
        run: bash package.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Installation

            1. Download `latch-${{ steps.version.outputs.VERSION }}.pkg` and double-click to install.
            2. Grant **Input Monitoring** permission when prompted:
               `System Settings → Privacy & Security → Input Monitoring → Add the app`

            ## Uninstallation

            Double-click `latch-uninstaller-${{ steps.version.outputs.VERSION }}.pkg`.
            Then remove the Input Monitoring entry manually in System Settings.

            ## Requirements

            - macOS 13 or later
          files: |
            dist/latch-${{ steps.version.outputs.VERSION }}.pkg
            dist/latch-uninstaller-${{ steps.version.outputs.VERSION }}.pkg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
